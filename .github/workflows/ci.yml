name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod tidy && git diff --exit-code go.sum

      - name: Check formatting
        shell: bash
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          ~/go/bin/gosec ./...

      - name: Test (race detector)
        run: go test ./... -race -count=1

      - name: Test (coverage)
        run: |
          # Exclude cmd/ — it is process-lifecycle wiring tested via integration,
          # not unit tests. Coverage is measured over internal/ packages only.
          go test $(go list ./... | grep -v '/cmd/') \
            -coverprofile=coverage.txt -covermode=atomic
          go tool cover -func=coverage.txt | tail -1

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/sqmeter-alpaca-safetymonitor-windows-amd64.exe \
            ./cmd/sqmeter-alpaca-safetymonitor

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/sqmeter-alpaca-safetymonitor-linux-amd64 \
            ./cmd/sqmeter-alpaca-safetymonitor

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test on Windows
        run: go test ./...

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $ldflags = "-X main.version=ci -X main.commit=${{ github.sha }} -X main.date=$date"
          go build -ldflags $ldflags -o dist/sqmeter-alpaca-safetymonitor-windows-amd64.exe ./cmd/sqmeter-alpaca-safetymonitor

      - name: Verify Windows executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $exe = ".\dist\sqmeter-alpaca-safetymonitor-windows-amd64.exe"

          $versionOutput = (& $exe --version) -join "`n"
          $versionOutput
          if ($versionOutput -notmatch "ci") {
            throw "version output did not include the CI version"
          }

          $configPath = Join-Path $env:RUNNER_TEMP "sqmeter-config.json"
          & $exe --config $configPath --write-default-config
          & $exe --config $configPath --check-config

  conformance:
    name: ASCOM Conformance
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build service
        run: |
          go build \
            -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/sqmeter-alpaca-safetymonitor \
            ./cmd/sqmeter-alpaca-safetymonitor

      - name: Download ConformU
        run: |
          mkdir -p .conform
          curl -sSL \
            "https://github.com/ASCOMInitiative/ConformU/releases/download/v4.3.0/conformu.linux-x64.tar.xz" \
            | tar -xJ -C .conform
          chmod +x .conform/conformu

      - name: Run conformance test
        run: |
          CONFORM_BIN=.conform/conformu bash scripts/conform.sh 2>&1 | tee conformance.log
          
      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: conformance.log
          if-no-files-found: warn
