name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod tidy && git diff --exit-code go.sum

      - name: Check formatting
        shell: bash
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test ./... -race -count=1

      - name: Test (coverage)
        run: |
          # Exclude cmd/ — it is process-lifecycle wiring tested via integration,
          # not unit tests. Coverage is measured over internal/ packages only.
          go test $(go list ./... | grep -v '/cmd/') \
            -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/sqmeter-alpaca-safetymonitor-windows-amd64.exe \
            ./cmd/sqmeter-alpaca-safetymonitor

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/sqmeter-alpaca-safetymonitor-linux-amd64 \
            ./cmd/sqmeter-alpaca-safetymonitor

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
